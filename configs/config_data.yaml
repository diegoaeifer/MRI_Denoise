data:
  raw_path: "data/IXI"
  processed_path: "data/processed"
  splits_path: "data/splits"
  normalization:
    type: "minmax_percentile"
    percentile_min: 0.05
    percentile_max: 99.5
    bit_depth: 16
  patch_size: [256, 256]
  split_ratios:
    train: 0.8
    test: 0.1
    val: 0.1
  seed: 42
  augmentation:
    sigma_min: 0.05
    sigma_max: 0.10
    noise_grid_size: 4
    noise_type: "rician" # Options: gaussian, rician
    flip_prob: 0.5
    rotate_prob: 0.5
    affine_prob: 0.1
    gamma_prob: 0.00
    gamma_range: [0.9, 1.1]
    ghosting_prob: 0.0
    spike_prob: 0.0
    blur_prob: 0.0
    motion_prob: 0.00
    bias_field_prob: 0.0
    bias_field_coeffs: 0.0
    anisotropy_prob: 0.05
    noise_multiplier_min: 0.5
    noise_multiplier_max: 3.0

    # Ranges
    anisotropy_downsampling: 1.5
    gibbs_cut_min: 20
    gibbs_cut_max: 601
