training:
  epochs: 200
  batch_size: 8
  num_workers:
  learning_rate: 1e-4
  optimizer: "AdamW"
  scheduler: "CosineAnnealing"

losses:
  weights:
    l1: 1.0
    ms_ssim: 0.1
    ssim: 0.0
    psnr: 0.0
    charbonnier: 0.0
    vgg: 0.1
    sure: 0.0
    haarpsi: 0.0
  auxiliary:
    charbonnier_eps: 0.001
    vgg_layer: "relu3_3"

data:
  augmentation:
    noise_type: "rician"
    sigma_min: 0.05
    sigma_max: 0.1
    noise_grid_size: 4
    flip_prob: 0.5
    rotate_prob: 0.5
    affine_prob: 0.1
    gamma_prob: 0.00
    gamma_range: [0.9, 1.1]
    bias_field_prob: 0.0
    bias_field_coeffs: 0.0
    anisotropy_prob: 0.1
    anisotropy_downsampling: 1.5
