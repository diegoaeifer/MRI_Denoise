training:
  epochs: 200
  batch_size: 8
  learning_rate: 5e-4
  optimizer: "AdamW" # Options: Adam, AdamW
  scheduler: "CosineAnnealing" # Options: CosineAnnealing, StepLR
  save_interval: 50
  seed: 42
  gpu_id: 0
  num_workers: 4
  dry_run: false # Set to true for verification run

losses:
  weights:
    l1: 1.0
    ms_ssim: 1.0
    ssim: 0.0
    psnr: 0.0
    charbonnier: 0
    vgg: 0
    sure: 0.0
    haarpsi: 0.0
    dists: 0.0
    lpips: 1.0
  auxiliary:
    charbonnier_eps: 0.001
    vgg_layer: "relu3_3"  
  