# MONAI Bundle — SNRAware fine-tuning config for MRI denoising
# Requires: pip install snraware omegaconf
# Reference: Microsoft SNRAware (https://github.com/microsoft/SNRAware)

spatial_dims: 2

data:
  root_dir: "data/raw"
  image_size: [256, 256]
  cache_rate: 0.5    # lower cache since SNRAware is memory-heavy
  num_workers: 2
  percentile_lower: 1.0
  percentile_upper: 99.0
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

noise:
  sigma_range: [0.02, 0.3]
  grid_size: 4
  noise_type: "gaussian"

network:
  _target_: mri_denoise.networks.registry.get_network
  name: snraware
  spatial_dims: "@spatial_dims"
  in_channels: 2
  out_channels: 1
  num_channels: 32     # compact backbone for 2D; increase to 64 for 3D
  patch_depth: 1       # 1 for 2D; set to real depth for 3D volumes

losses:
  spatial_dims: "@spatial_dims"
  data_range: 1.0
  weights:
    l1: 0.0
    charbonnier: 1.0
    ssim: 0.1
    psnr: 0.05
    haarpsi: 0.0
    epi: 0.0
    perceptual: 0.0
    sure: 0.0

training:
  epochs: 80
  lr: 1.0e-4
  optimizer: AdamW
  weight_decay: 1.0e-4
  scheduler: CosineAnnealingLR
  scheduler_T_max: 80
  use_amp: true
  val_interval: 1
  checkpoint_interval: 5
  output_dir: experiments
  batch_size: 4
  sw_batch_size: 2
  sw_overlap: 0.25
